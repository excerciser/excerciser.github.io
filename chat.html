<!DOCTYPE html>
<html>
<head>
    <title>Live Chat Room</title>
    <style>
        body {
            background-color: #008080; /* Matching Teal */
            font-family: "Times New Roman", Times, serif;
            color: black;
            margin: 20px;
        }

        .window {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            width: 500px; /* Narrower width, perfect for a standalone chat column */
            margin: 30px auto;
            padding: 2px;
        }

        .title-bar {
            background: linear-gradient(90deg, #800000, #ff0000); /* Stream-style red title bar */
            color: white;
            padding: 3px 5px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }

        .chat-container {
            background-color: #fff;
            border: 3px inset #ffffff;
            height: 500px; /* Tall box for a long scrolling history */
            margin: 10px;
            display: flex;
            flex-direction: column;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .nav-box {
            background-color: #c0c0c0;
            padding: 10px;
            text-align: center;
            border-top: 2px solid #808080;
        }

        a { color: blue; font-weight: bold; }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">🔴_LIVE_CHAT.EXE</div>
    
    <div class="chat-container">
        <iframe src="https://www.cbox.ws/box/?boxid=8&boxtag=v8nu7f" title="Demo Chat"></iframe>
    </div>

    <div class="nav-box">
        <a href="index.html">[ Back to Home ]</a>
    </div>
</div>

</body>
</html>
