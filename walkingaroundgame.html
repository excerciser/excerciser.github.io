<!DOCTYPE html>
<html>
<head>
    <title>Walking Around RPG v1.1</title>
    <style>
        body {
            background-color: #000;
            color: #00ff00; 
            font-family: "Courier New", Courier, monospace;
            padding: 20px;
        }

        .game-window {
            background-color: #c0c0c0;
            color: #000;
            border: 4px outset #fff;
            width: 600px;
            margin: 0 auto;
            padding: 10px;
            box-shadow: 5px 5px 0px #000;
        }

        /* Sound Control Panel */
        .audio-deck {
            background: #a0a0a0;
            border: 2px inset #fff;
            padding: 5px;
            margin-bottom: 10px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .screen {
            background-color: #8bac0f; 
            color: #0f380f;
            border: 3px inset #808080;
            height: 180px;
            padding: 15px;
            overflow-y: auto;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .btn {
            background-color: #c0c0c0;
            border: 2px outset #fff;
            padding: 8px 15px;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
            margin: 5px;
        }

        .btn:active {
            border-style: inset;
        }

        .inventory-box, .crafting-box {
            background-color: #fff;
            border: 2px inset #808080;
            padding: 10px;
            margin-top: 10px;
            max-height: 140px;
            overflow-y: auto;
        }

        h3 { margin-top: 0; font-family: Arial, sans-serif; }
    </style>
</head>
<body>

<div class="game-window">
    <div style="font-weight: bold; font-size: 14px; margin-bottom: 5px;">💾 SCAVENGER.EXE</div>
    
    <!-- Audio Deck Controller -->
    <div class="audio-deck">
        <span>📻 SOUND SYSTEM:</span>
        <div>
            <button class="btn" style="padding:2px 5px; font-size:11px;" onclick="toggleMusic()">🎵 Toggle BGM</button>
            <span id="bgmStatus" style="font-weight:bold; color:red;">OFF</span>
        </div>
    </div>

    <!-- Game Screen Console -->
    <div class="screen" id="gameScreen">
        A wild world awaits... Click "EXPLORE" to search for items! (Turn on BGM above for chiptunes!)
    </div>

    <!-- Actions -->
    <center>
        <button class="btn" onclick="explore()">🥾 EXPLORE</button>
    </center>

    <!-- Inventory Section -->
    <div class="inventory-box">
        <h3>🎒 INVENTORY</h3>
        <div id="inventoryList">Your bag is empty.</div>
    </div>

    <!-- Crafting Section -->
    <div class="crafting-box">
        <h3>🔨 CRAFTING BENCH</h3>
        <div id="craftingList"></div>
    </div>

    <p style="text-align: center; font-size: 12px;">
        <a href="index.html" style="color: blue;">[ Back to Home ]</a>
    </p>
</div>

<script>
    // --- AUDIO SYSTEM LAYER (Synth Generator) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let bgmInterval = null;
    let isMusicPlaying = false;

    // Helper function to synthesize a quick 8-bit sound wave tone
    function playTone(freq, type, duration, startTime = 0) {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        osc.type = type; // square = retro arcade, triangle = deeper, sawtooth = buzzy
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startTime);
        
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime + startTime);
        // Linear fade-out to prevent popping audio cracks
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + startTime + duration);
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        osc.start(audioCtx.currentTime + startTime);
        osc.stop(audioCtx.currentTime + startTime + duration);
    }

    // Dynamic Sound Effects
    function playClickSound() {
        playTone(150, 'triangle', 0.05);
    }

    function playRareSound() {
        playTone(523.25, 'square', 0.1); // C5
        playTone(659.25, 'square', 0.1, 0.1); // E5
        playTone(783.99, 'square', 0.2, 0.2); // G5
    }

    function playTrashSound() {
        playTone(80, 'sawtooth', 0.2); // Low buzz drop
    }

    function playCraftSound() {
        playTone(440, 'square', 0.08);
        playTone(880, 'square', 0.08, 0.08);
        playTone(1200, 'square', 0.15, 0.16);
    }

    // 8-Bit Looping Background Music Sequence
    function playBGM() {
        if (!isMusicPlaying) return;
        // Simple retro baseline melody notes array
        const notes = [130.81, 146.83, 164.81, 196.00, 164.81, 146.83];
        let count = 0;

        bgmInterval = setInterval(() => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            let currentNote = notes[count % notes.length];
            // Play a soft, pulsing bass square note every 300ms
            playTone(currentNote, 'square', 0.2);
            count++;
        }, 300);
    }

    function toggleMusic() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        isMusicPlaying = !isMusicPlaying;
        const status = document.getElementById("bgmStatus");
        
        if (isMusicPlaying) {
            status.innerHTML = "ON";
            status.style.color = "green";
            playBGM();
        } else {
            status.innerHTML = "OFF";
            status.style.color = "red";
            clearInterval(bgmInterval);
        }
    }


    // --- GAME ENGINE LAYER ---
    const LOOT_POOL = {
        trash: ["Crushed Soda Can", "Old Receipt", "Bitten Apple Core", "Lint Ball"],
        common: ["Rusty Screw", "Plastic Straw", "AA Battery", "Rubber Band", "Copper Wire"],
        rare: ["Cracked Phone Screen", "Vintage Postcard", "Shiny Marble", "Old Key"],
        ultra_rare: ["Broken Game Boy", "Glowing Crystal", "Pre-War Coin"],
        one_of_a_kind: ["The Golden Microchip", "Ancient Cyber-Artifact"]
    };

    const RECIPES = [
        { 
            result: "Retro Cyber-Deck (RARE)", 
            requires: { "Broken Game Boy": 1, "Copper Wire": 2, "AA Battery": 1 } 
        },
        { 
            result: "Improvised Laser Pointer (ULTRA RARE)", 
            requires: { "Glowing Crystal": 1, "AA Battery": 2, "Rusty Screw": 1 } 
        }
    ];

    let inventory = {};
    const screen = document.getElementById("gameScreen");
    const invList = document.getElementById("inventoryList");
    const craftList = document.getElementById("craftingList");

    function explore() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        let rand = Math.random() * 100;
        let rarity = "";
        let color = "";

        if (rand < 40) { rarity = "trash"; color = "#666"; playTrashSound(); }
        else if (rand < 75) { rarity = "common"; color = "#000"; playClickSound(); }
        else if (rand < 92) { rarity = "rare"; color = "blue"; playRareSound(); }
        else if (rand < 99) { rarity = "ultra_rare"; color = "purple"; playRareSound(); }
        else { rarity = "one_of_a_kind"; color = "red"; playRareSound(); }

        const items = LOOT_POOL[rarity];
        const foundItem = items[Math.floor(Math.random() * items.length)];

        inventory[foundItem] = (inventory[foundItem] || 0) + 1;

        screen.innerHTML = `
            💥 A wild encounter!<br><br>
            You searched the area and picked up:<br>
            <span style="color: ${color}; font-size: 18px;">▶ ${foundItem} (${rarity.toUpperCase().replace('_', ' ')})</span>
        `;
        screen.scrollTop = screen.scrollHeight;

        updateInventoryUI();
    }

    function updateInventoryUI() {
        if (Object.keys(inventory).length === 0) {
            invList.innerHTML = "Your bag is empty.";
            return;
        }
        invList.innerHTML = Object.keys(inventory).map(item => `📦 <b>${item}</b> x${inventory[item]}`).join("<br>");
        updateCraftingUI();
    }

    function updateCraftingUI() {
        craftList.innerHTML = RECIPES.map((recipe, index) => {
            let requirementsMet = true;
            let reqText = Object.keys(recipe.requires).map(reqItem => {
                let count = inventory[reqItem] || 0;
                let needed = recipe.requires[reqItem];
                if (count < needed) requirementsMet = false;
                return `${reqItem} (${count}/${needed})`;
            }).join(", ");

            let button = requirementsMet 
                ? `<button class="btn" onclick="craftItem(${index})">CRAFT</button>` 
                : `<button class="btn" disabled style="opacity:0.5;">LACK MATERIALS</button>`;

            return `<div><strong>${recipe.result}</strong><br>Requires: ${reqText}<br>${button}</div><hr>`;
        }).join("");
    }

    function craftItem(recipeIndex) {
        playCraftSound();
        const recipe = RECIPES[recipeIndex];
        
        Object.keys(recipe.requires).forEach(reqItem => {
            inventory[reqItem] -= recipe.requires[reqItem];
            if (inventory[reqItem] === 0) delete inventory[reqItem];
        });

        inventory[recipe.result] = (inventory[recipe.result] || 0) + 1;
        screen.innerHTML = `🛠️ SUCCESS!<br><br>You used your workbench to construct:<br><span style="color: darkgreen; font-size: 18px;">✨ ${recipe.result} ✨</span>`;
        
        updateInventoryUI();
    }

    updateCraftingUI();
</script>

</body>
</html>
