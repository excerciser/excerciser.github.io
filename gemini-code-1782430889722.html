<!DOCTYPE html>
<html>
<head>
    <title>Retro Snake Game</title>
    <style>
        body {
            background-color: #000; /* Classic black background for games */
            color: #0f0; /* Neon green "matrix" text */
            font-family: "Courier New", Courier, monospace;
            text-align: center;
        }
        canvas {
            border: 5px outset #808080;
            background-color: #050505;
            display: block;
            margin: 20px auto;
        }
        .ui-box {
            background-color: #c0c0c0;
            color: #000;
            border: 2px solid #fff;
            width: 400px;
            margin: 0 auto;
            padding: 10px;
        }
        a { color: blue; }
    </style>
</head>
<body>

    <div class="ui-box">
        <b>SNAKE.EXE</b><br>
        Score: <span id="score">0</span>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="ui-box">
        <p>Use <b>Arrow Keys</b> to Move</p>
        <p><a href="index.html">[ Back to Home ]</a></p>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        let score = 0;
        let snake = [{x: 200, y: 200}, {x: 190, y: 200}, {x: 180, y: 200}];
        let dx = 10;
        let dy = 0;
        let foodX;
        let foodY;

        function main() {
            if (didGameEnd()) {
                alert("GAME OVER! Your Score: " + score);
                document.location.reload();
                return;
            }

            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 100);
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach(part => {
                ctx.fillStyle = "#0f0";
                ctx.strokeStyle = "#000";
                ctx.fillRect(part.x, part.y, 10, 10);
                ctx.strokeRect(part.x, part.y, 10, 10);
            });
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            const didEatFood = snake[0].x === foodX && snake[0].y === foodY;
            if (didEatFood) {
                score += 10;
                scoreElement.innerHTML = score;
                createFood();
            } else {
                snake.pop();
            }
        }

        function didGameEnd() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x > canvas.width - 10;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y > canvas.height - 10;
            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall;
        }

        function createFood() {
            foodX = Math.round((Math.random() * (canvas.width-10)) / 10) * 10;
            foodY = Math.round((Math.random() * (canvas.height-10)) / 10) * 10;
        }

        function drawFood() {
            ctx.fillStyle = "red";
            ctx.fillRect(foodX, foodY, 10, 10);
        }

        function changeDirection(event) {
            const LEFT_KEY = 37; const RIGHT_KEY = 39; const UP_KEY = 38; const DOWN_KEY = 40;
            const keyPressed = event.keyCode;
            const goingUp = dy === -10; const goingDown = dy === 10;
            const goingRight = dx === 10; const goingLeft = dx === -10;

            if (keyPressed === LEFT_KEY && !goingRight) { dx = -10; dy = 0; }
            if (keyPressed === UP_KEY && !goingDown) { dx = 0; dy = -10; }
            if (keyPressed === RIGHT_KEY && !goingLeft) { dx = 10; dy = 0; }
            if (keyPressed === DOWN_KEY && !goingUp) { dx = 0; dy = 10; }
        }

        document.addEventListener("keydown", changeDirection);
        createFood();
        main();
    </script>
</body>
</html>
